<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#222228" id="meta-theme-color">
  <title>Promoções</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Outfit:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <script src="js/config.js" defer></script>
  <script src="js/config-aplicar.js" defer></script>
  <script src="js/cardapio.js" defer></script>
  <script src="js/promocoes-dados.js" defer></script>
  <script src="js/promocoes-store.js" defer></script>
  <script src="js/carrinho-compartilhado.js" defer></script>
  <script src="js/carrinho-render.js" defer></script>
  <script src="js/carrinho-ui.js" defer></script>
  <script src="js/promocoes.js" defer></script>
</head>
<body class="corpo pagina-promocoes" data-titulo-pagina="Promoções">

  <nav class="nav-site container" aria-label="Menu">
    <a class="nav-site__marca" href="index.html">
      <img src="img/logo.png" alt="" class="nav-site__logo" width="40" height="40">
      <span id="nav-nome">Império Pizzaria</span>
    </a>
    <div class="nav-site__links">
      <a href="index.html" class="nav-site__link">Promoções</a>
      <a href="promocoes.html" class="nav-site__link nav-site__link--ativo">Combos</a>
    </div>
  </nav>

  <header class="pagina-topo container">
    <h1 class="pagina-topo__titulo">Promoções & Combos</h1>
    <p class="pagina-topo__texto">
      Ofertas especiais e combos com bebida. Preços editáveis no
      <a href="painel.html" class="rodape__link">painel administrativo</a>.
    </p>
  </header>

  <main class="principal container">
    <div class="abas" role="tablist">
      <button type="button" class="abas__btn abas__btn--ativo" data-aba="promocoes" role="tab">
        🏷️ Promoções
      </button>
      <button type="button" class="abas__btn" data-aba="combos" role="tab">
        🎁 Combos
      </button>
      <button type="button" class="abas__btn" data-aba="bebidas" role="tab">
        🥤 Bebidas
      </button>
    </div>

    <div class="abas__conteudo">
      <section id="aba-promocoes" class="abas__painel abas__painel--ativo" role="tabpanel">
        <h2 class="secao-pagamento__titulo">Pizzas em promoção</h2>
        <div class="promo-grid" id="lista-promocoes"></div>
      </section>

      <section id="aba-combos" class="abas__painel" role="tabpanel" hidden>
        <h2 class="secao-pagamento__titulo">Combos pizza + bebida</h2>
        <div class="promo-grid" id="lista-combos"></div>
      </section>

      <section id="aba-bebidas" class="abas__painel" role="tabpanel" hidden>
        <h2 class="secao-pagamento__titulo">Bebidas em promoção</h2>
        <div class="promo-grid" id="lista-bebidas-promo"></div>
      </section>
    </div>
  </main>

  <footer class="rodape container">
    <p>
      <span id="rodape-nome">Império Pizzaria</span> ·
      <a href="painel.html" class="rodape__link">Editar promoções</a>
    </p>
  </footer>

  <aside class="carrinho carrinho--fechado" id="carrinho" aria-label="Carrinho">
    <div class="carrinho__backdrop" id="carrinho-backdrop" aria-hidden="true"></div>
    <div class="carrinho__painel" id="carrinho-painel">
      <div class="carrinho__topo">
        <h2 class="carrinho__titulo">Detalhes do pedido</h2>
        <button type="button" class="carrinho__fechar" id="carrinho-fechar" aria-label="Fechar">✕</button>
      </div>
      <ul id="lista-carrinho" class="carrinho__lista">
        <li class="carrinho__vazio">Nenhum item ainda.</li>
      </ul>
      <div class="carrinho__rodape">
        <div class="carrinho__total">
          <span>Total</span>
          <span class="carrinho__preco">R$ <strong id="valor-total">0,00</strong></span>
        </div>
        <div class="carrinho__botoes">
          <button type="button" id="btn-finalizar" class="btn btn--gradiente">Finalizar pedido</button>
          <button type="button" id="btn-limpar" class="btn btn--fantasma">Limpar</button>
        </div>
        <p id="mensagem-pedido" class="alerta" aria-live="polite"></p>
      </div>
    </div>
    <button type="button" class="carrinho__aba" id="carrinho-aba" aria-expanded="false" aria-controls="carrinho-painel" title="Abrir pedido">
      <span class="carrinho__aba-trilho" aria-hidden="true"><span class="carrinho__aba-barra"></span></span>
      <span class="carrinho__aba-texto">Seu pedido</span>
      <span class="carrinho__contador carrinho__contador--aba" id="carrinho-contador" hidden>0</span>
    </button>
  </aside>

</body>
</html>
